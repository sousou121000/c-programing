<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>レビューサイト</title>

<style>
body{
    font-family: sans-serif;
    background:#f5f5f5;
    text-align:center;
    padding:20px;
}

.container{
    max-width:600px;
    margin:auto;
}

input, textarea, select{
    width:90%;
    padding:10px;
    margin:5px;
}

button{
    padding:10px 20px;
    margin:5px;
    cursor:pointer;
}

.review{
    background:white;
    padding:15px;
    margin-top:10px;
    border-radius:10px;
    text-align:left;
    box-shadow:0 0 5px rgba(0,0,0,0.2);
}

.delete-btn{
    background:red;
    color:white;
    border:none;
    border-radius:5px;
}

#average{
    font-size:20px;
    font-weight:bold;
    margin:15px;
}
</style>
</head>
<body>

<div class="container">

<h1>レビューサイト</h1>

<input type="text" id="name" placeholder="名前">

<select id="rating">
    <option value="5">★★★★★</option>
    <option value="4">★★★★☆</option>
    <option value="3">★★★☆☆</option>
    <option value="2">★★☆☆☆</option>
    <option value="1">★☆☆☆☆</option>
</select>

<input type="password" id="password" placeholder="削除用パスワード">

<textarea id="reviewText" placeholder="レビューを書いてください"></textarea>

<br>

<button onclick="addReview()">投稿</button>

<div id="average">平均評価：0.0 ⭐</div>

<div id="reviews"></div>

</div>

<script>

let reviews = JSON.parse(localStorage.getItem("reviews")) || [];

function saveReviews(){
    localStorage.setItem("reviews", JSON.stringify(reviews));
}

function updateAverage(){

    if(reviews.length === 0){
        document.getElementById("average").innerHTML =
        "平均評価：0.0 ⭐";
        return;
    }

    let total = 0;

    reviews.forEach(review=>{
        total += review.rating;
    });

    let avg = (total / reviews.length).toFixed(1);

    document.getElementById("average").innerHTML =
    `平均評価：${avg} ⭐`;
}

function displayReviews(){

    const reviewsDiv =
    document.getElementById("reviews");

    reviewsDiv.innerHTML = "";

    reviews.forEach((review,index)=>{

        const div = document.createElement("div");

        div.className = "review";

        div.innerHTML = `
            <h3>${review.name}</h3>
            <p>${"⭐".repeat(review.rating)}</p>
            <p>${review.text}</p>
            <button class="delete-btn"
            onclick="deleteReview(${index})">
            削除
            </button>
        `;

        reviewsDiv.appendChild(div);

    });

    updateAverage();
}

function addReview(){

    const name =
    document.getElementById("name").value.trim();

    const rating =
    Number(document.getElementById("rating").value);

    const password =
    document.getElementById("password").value;

    const text =
    document.getElementById("reviewText").value.trim();

    if(name === "" || password === "" || text === ""){
        alert("すべて入力してください");
        return;
    }

    reviews.push({
        name:name,
        rating:rating,
        password:password,
        text:text
    });

    saveReviews();
    displayReviews();

    document.getElementById("name").value="";
    document.getElementById("password").value="";
    document.getElementById("reviewText").value="";
}

function deleteReview(index){

    const input =
    prompt("削除用パスワードを入力してください");

    if(input === reviews[index].password){

        reviews.splice(index,1);

        saveReviews();

        displayReviews();

    }else{

        alert("パスワードが違います");

    }
}

displayReviews();

</script>

</body>
</html>
